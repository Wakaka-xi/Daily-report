<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>生成封面图</title>
<style>
  body { margin: 0; background: #333; display: flex; flex-direction: column; align-items: center; padding: 30px; gap: 20px; font-family: sans-serif; }
  canvas { border: 2px solid #555; }
  button { padding: 12px 32px; font-size: 16px; background: #d4692a; color: white; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #b85520; }
  p { color: #ccc; font-size: 14px; }
</style>
</head>
<body>
<p style="color:#fff;font-size:18px;font-weight:bold;">保险素材日报 · 封面图生成器</p>
<canvas id="c" width="600" height="600"></canvas>
<button onclick="download()">下载 preview.png</button>
<p>下载后上传到 GitHub 仓库根目录，文件名保存为 preview.png</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function draw() {
  const W = 600, H = 600;

  // 背景渐变
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#f5f0ea');
  bg.addColorStop(1, '#ece6dc');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 顶部橙色色块
  ctx.fillStyle = '#d4692a';
  ctx.fillRect(0, 0, W, 12);

  // 底部橙色色块
  ctx.fillStyle = '#d4692a';
  ctx.fillRect(0, H - 12, W, 12);

  // 左侧装饰条
  ctx.fillStyle = '#d4692a';
  ctx.fillRect(0, 12, 6, H - 24);

  // 右侧装饰条
  ctx.fillStyle = '#e8a070';
  ctx.fillRect(W - 6, 12, 6, H - 24);

  // 盾牌图标（简化绘制）
  ctx.save();
  ctx.translate(300, 180);
  ctx.scale(1, 1);
  // 外圈圆形背景
  ctx.beginPath();
  ctx.arc(0, 0, 90, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(212, 105, 42, 0.12)';
  ctx.fill();
  // 盾牌主体
  ctx.beginPath();
  ctx.moveTo(0, -55);
  ctx.lineTo(50, -25);
  ctx.lineTo(50, 15);
  ctx.bezierCurveTo(50, 50, 0, 65, 0, 65);
  ctx.bezierCurveTo(0, 65, -50, 50, -50, 15);
  ctx.lineTo(-50, -25);
  ctx.closePath();
  ctx.fillStyle = '#d4692a';
  ctx.fill();
  // 盾牌内部 checkmark
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(-22, 5);
  ctx.lineTo(-5, 22);
  ctx.lineTo(25, -15);
  ctx.stroke();
  ctx.restore();

  // 主标题
  ctx.fillStyle = '#2c1a0e';
  ctx.font = 'bold 72px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('每日素材', 300, 340);

  // 分隔线
  ctx.strokeStyle = '#d4692a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(120, 390);
  ctx.lineTo(480, 390);
  ctx.stroke();

  // 副标题
  ctx.fillStyle = '#8b6347';
  ctx.font = '32px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillText('每日精选 · 短视频素材', 300, 430);

  // 底部标语
  ctx.fillStyle = '#b07850';
  ctx.font = '22px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillText('脚本 · 素材 · 热点 · 文案', 300, 510);

  // 右下角小标
  ctx.fillStyle = '#c0a080';
  ctx.font = '18px "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('Daily Insurance Content', 570, 565);
}

function download() {
  draw();
  const link = document.createElement('a');
  link.download = 'preview.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

draw();
</script>
</body>
</html>
